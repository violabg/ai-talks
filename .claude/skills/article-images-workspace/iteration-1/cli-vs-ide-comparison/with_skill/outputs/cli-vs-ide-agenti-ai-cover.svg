  <text x="200" y="53" text-anchor="middle" font-family="monospace" font-size="11" fill="#64748b">bash — terminal</text>

  <!-- CLI content: terminal lines -->
  <text x="52" y="95" font-family="monospace" font-size="12" fill="#22c55e">$</text>
  <text x="64" y="95" font-family="monospace" font-size="12" fill="#94a3b8"> claude-code run scan</text>

  <text x="52" y="118" font-family="monospace" font-size="11" fill="#64748b">→ scanning 142 files...</text>
  <text x="52" y="135" font-family="monospace" font-size="11" fill="#64748b">→ found 8 naming issues</text>
  <text x="52" y="152" font-family="monospace" font-size="11" fill="#64748b">→ applying codemod...</text>
  <text x="52" y="169" font-family="monospace" font-size="11" fill="#22c55e">✓ done in 2.1s</text>

  <text x="52" y="200" font-family="monospace" font-size="12" fill="#22c55e">$</text>
  <text x="64" y="200" font-family="monospace" font-size="12" fill="#94a3b8"> pnpm test</text>
  <text x="52" y="220" font-family="monospace" font-size="11" fill="#64748b">PASS src/auth.test.ts</text>
  <text x="52" y="237" font-family="monospace" font-size="11" fill="#64748b">PASS src/api.test.ts</text>
  <text x="52" y="254" font-family="monospace" font-size="11" fill="#22c55e">Tests: 24 passed</text>

  <text x="52" y="285" font-family="monospace" font-size="12" fill="#22c55e">$</text>
  <text x="64" y="285" font-family="monospace" font-size="12" fill="#94a3b8"> git commit -m "fix"</text>
  <text x="52" y="305" font-family="monospace" font-size="11" fill="#64748b">[main a3f8c12] fix: naming</text>

  <!-- Cursor blink -->
  <rect x="52" y="328" width="8" height="14" rx="1" fill="#7c3aed" opacity="0.9"/>

