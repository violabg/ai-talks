  <rect x="52" y="360" width="88" height="24" rx="6" fill="#7c3aed" opacity="0.2" stroke="#7c3aed" stroke-width="1"/>
  <text x="96" y="377" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#a78bfa" font-weight="600">CLI AI</text>

  <text x="96" y="408" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#475569">Automazione · Repo-wide · Pipeline</text>

  <!-- Right panel: IDE zone -->
  <rect x="430" y="30" width="340" height="390" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>

