  <text x="444" y="112" font-family="monospace" font-size="9" fill="#64748b">▸ src/</text>
  <text x="452" y="128" font-family="monospace" font-size="9" fill="#94a3b8">▾ components/</text>
  <text x="460" y="144" font-family="monospace" font-size="9" fill="#a78bfa">  Button.tsx</text>
  <text x="460" y="158" font-family="monospace" font-size="9" fill="#64748b">  Card.tsx</text>
  <text x="452" y="174" font-family="monospace" font-size="9" fill="#64748b">▸ lib/</text>
  <text x="452" y="190" font-family="monospace" font-size="9" fill="#64748b">▸ pages/</text>

  <!-- IDE main editor area -->
  <!-- Line numbers + code -->
  <text x="520" y="92" font-family="monospace" font-size="9" fill="#475569">1</text>
  <text x="532" y="92" font-family="monospace" font-size="9" fill="#64748b">import React from 'react'</text>

  <text x="520" y="108" font-family="monospace" font-size="9" fill="#475569">2</text>

  <text x="520" y="124" font-family="monospace" font-size="9" fill="#475569">3</text>
  <text x="532" y="124" font-family="monospace" font-size="9" fill="#7c3aed">export</text>
  <text x="572" y="124" font-family="monospace" font-size="9" fill="#94a3b8"> function Button(</text>

  <text x="520" y="140" font-family="monospace" font-size="9" fill="#475569">4</text>
  <!-- highlight selection -->
  <rect x="530" y="146" width="220" height="14" rx="2" fill="#7c3aed" opacity="0.15"/>
  <text x="532" y="156" font-family="monospace" font-size="9" fill="#a78bfa">  { children, onClick }: Props</text>

  <text x="520" y="172" font-family="monospace" font-size="9" fill="#475569">5</text>
  <text x="532" y="172" font-family="monospace" font-size="9" fill="#64748b">) {'{'}  </text>

  <text x="520" y="188" font-family="monospace" font-size="9" fill="#475569">6</text>
  <text x="532" y="188" font-family="monospace" font-size="9" fill="#64748b">  return (</text>

  <!-- Inline error squiggle line -->
  <text x="520" y="204" font-family="monospace" font-size="9" fill="#475569">7</text>
  <text x="532" y="204" font-family="monospace" font-size="9" fill="#64748b">    &lt;button</text>
  <!-- red squiggle under "button" -->
  <path d="M532,207 Q540,210 548,207 Q556,204 564,207 Q572,210 580,207" stroke="#ef4444" stroke-width="1.5" fill="none" opacity="0.8"/>

  <!-- AI chat panel on the right side of IDE -->
  <rect x="660" y="66" width="110" height="354" rx="0" fill="#111827" stroke="#334155" stroke-width="0.5"/>
  <text x="715" y="86" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#475569">AI CHAT</text>

  <!-- Chat bubble user -->
  <rect x="668" y="96" width="94" height="30" rx="6" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
  <text x="715" y="109" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#94a3b8">Perché il button</text>
  <text x="715" y="120" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#94a3b8">rompe il layout?</text>

  <!-- Chat bubble AI -->
  <rect x="668" y="135" width="94" height="56" rx="6" fill="#7c3aed" opacity="0.2" stroke="#7c3aed" stroke-width="0.5"/>
  <text x="715" y="150" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#a78bfa">Manca il prop</text>
  <text x="715" y="163" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#a78bfa">`type="button"`</text>
  <text x="715" y="176" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#a78bfa">per evitare il</text>
  <text x="715" y="187" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#a78bfa">submit di default.</text>

  <!-- IDE label -->
  <rect x="454" y="360" width="88" height="24" rx="6" fill="#7c3aed" opacity="0.2" stroke="#7c3aed" stroke-width="1"/>
  <text x="498" y="377" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#a78bfa" font-weight="600">IDE AI</text>

  <text x="498" y="408" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#475569">Iterazione · Contesto locale · Refactor</text>

  <!-- Center divider and VS label -->
  <line x1="400" y1="80" x2="400" y2="370" stroke="#334155" stroke-width="1" stroke-dasharray="4,4"/>
  <circle cx="400" cy="225" r="18" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
  <text x="400" y="230" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#64748b" font-weight="700">vs</text>

  <!-- Bottom title area -->
  <text x="400" y="435" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#475569">CLI AI vs IDE AI — quale superficie per il tuo workflow</text>
</svg>
