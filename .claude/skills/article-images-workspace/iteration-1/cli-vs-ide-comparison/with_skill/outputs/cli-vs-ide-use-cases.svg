<svg width="800" height="480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
    <marker id="arrow-primary" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="480" fill="#f1f5f9"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#334155" font-weight="700">Quale superficie per il tuo task?</text>

  <!-- Center decision diamond -->
  <polygon points="400,80 460,118 400,156 340,118" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="400" y="113" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#92400e" font-weight="600">Il task è</text>
  <text x="400" y="128" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#92400e" font-weight="600">ampio/ripetibile?</text>

  <!-- Arrow left: NO (IDE) -->
  <line x1="340" y1="118" x2="200" y2="118" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="270" y="110" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#64748b">No</text>

  <!-- Arrow right: YES (CLI) -->
  <line x1="460" y1="118" x2="600" y2="118" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="530" y="110" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#64748b">Sì</text>

  <!-- ===== LEFT COLUMN: IDE AI ===== -->
  <!-- Header box -->
  <rect x="50" y="90" width="150" height="56" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="125" y="116" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#5b21b6" font-weight="700">IDE AI</text>
  <text x="125" y="135" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#7c3aed">Cursor, VS Code</text>

  <!-- IDE use case cards -->
  <rect x="50" y="180" width="150" height="52" rx="8" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="125" y="200" text-anchor="middle" font-family="monospace" font-size="11" fill="#475569" font-weight="600">Refactor mirato</text>
  <text x="125" y="218" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#64748b">simboli, responsabilità</text>

  <rect x="50" y="248" width="150" height="52" rx="8" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="125" y="268" text-anchor="middle" font-family="monospace" font-size="11" fill="#475569" font-weight="600">Review locale</text>
  <text x="125" y="286" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#64748b">file, diff, errori inline</text>

  <rect x="50" y="316" width="150" height="52" rx="8" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="125" y="336" text-anchor="middle" font-family="monospace" font-size="11" fill="#475569" font-weight="600">Debug editoriale</text>
  <text x="125" y="354" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#64748b">language server, panels</text>

  <rect x="50" y="384" width="150" height="52" rx="8" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="125" y="404" text-anchor="middle" font-family="monospace" font-size="11" fill="#475569" font-weight="600">Scrittura assistita</text>
  <text x="125" y="422" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#64748b">componenti, hook, funzioni</text>

  <!-- Connecting lines IDE -->
  <line x1="125" y1="146" x2="125" y2="180" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow-primary)"/>
  <line x1="125" y1="232" x2="125" y2="248" stroke="#94a3b8" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="125" y1="300" x2="125" y2="316" stroke="#94a3b8" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="125" y1="368" x2="125" y2="384" stroke="#94a3b8" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- IDE strength tag -->
  <rect x="65" y="450" width="120" height="20" rx="6" fill="#ede9fe"/>
  <text x="125" y="464" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#7c3aed" font-weight="600">Iterazione · Contesto locale</text>

  <!-- ===== RIGHT COLUMN: CLI AI ===== -->
  <!-- Header box -->
  <rect x="600" y="90" width="150" height="56" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="675" y="116" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#5b21b6" font-weight="700">CLI AI</text>
  <text x="675" y="135" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#7c3aed">Claude Code, Codex</text>

  <!-- CLI use case cards -->
  <rect x="600" y="180" width="150" height="52" rx="8" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="675" y="200" text-anchor="middle" font-family="monospace" font-size="11" fill="#475569" font-weight="600">Scansione repo</text>
  <text x="675" y="218" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#64748b">pattern, naming, refactor ampio</text>

  <rect x="600" y="248" width="150" height="52" rx="8" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="675" y="268" text-anchor="middle" font-family="monospace" font-size="11" fill="#475569" font-weight="600">Loop di verifica</text>
  <text x="675" y="286" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#64748b">test, lint, build, feedback</text>

  <rect x="600" y="316" width="150" height="52" rx="8" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="675" y="336" text-anchor="middle" font-family="monospace" font-size="11" fill="#475569" font-weight="600">Task ripetibili</text>
  <text x="675" y="354" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#64748b">scaffolding, codemod, changelog</text>

  <rect x="600" y="384" width="150" height="52" rx="8" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="675" y="404" text-anchor="middle" font-family="monospace" font-size="11" fill="#475569" font-weight="600">Workflow scriptabili</text>
  <text x="675" y="422" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#64748b">pipeline, automazione, commit</text>

  <!-- Connecting lines CLI -->
  <line x1="675" y1="146" x2="675" y2="180" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow-primary)"/>
  <line x1="675" y1="232" x2="675" y2="248" stroke="#94a3b8" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="675" y1="300" x2="675" y2="316" stroke="#94a3b8" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="675" y1="368" x2="675" y2="384" stroke="#94a3b8" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- CLI strength tag -->
  <rect x="590" y="450" width="170" height="20" rx="6" fill="#ede9fe"/>
  <text x="675" y="464" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#7c3aed" font-weight="600">Automazione · Ripetibilità · Pipeline</text>

  <!-- Center vertical divider -->
  <line x1="400" y1="175" x2="400" y2="445" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="5,5"/>

  <!-- Caption -->
  <text x="400" y="470" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#64748b">La scelta dipende dal tipo di attrito che vuoi eliminare, non dal modello sottostante</text>
</svg>
