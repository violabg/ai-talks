<svg width="800" height="500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="500" fill="#f8fafc"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-family="sans-serif" font-size="17" fill="#1e293b" font-weight="bold">Workflow multi-agente con singola responsabilita</text>

  <!-- Vertical spine line -->
  <line x1="400" y1="60" x2="400" y2="470" stroke="#e2e8f0" stroke-width="2"/>

  <!-- ===== STEP 1 ===== -->
  <!-- Step circle -->
  <circle cx="400" cy="90" r="22" fill="#6366f1"/>
  <text x="400" y="96" text-anchor="middle" font-family="sans-serif" font-size="14" fill="white" font-weight="bold">1</text>
  <!-- Step label -->
  <text x="440" y="85" font-family="sans-serif" font-size="13" fill="#1e293b" font-weight="bold">Research Agent</text>
  <text x="440" y="103" font-family="monospace" font-size="11" fill="#64748b">Analizza la codebase</text>
  <!-- Artifact box right -->
  <rect x="600" y="68" width="165" height="44" rx="7" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="682" y="86" text-anchor="middle" font-family="monospace" font-size="11" fill="#1d4ed8" font-weight="bold">RESEARCH.md</text>
  <text x="682" y="103" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#3b82f6">file rilevanti · pattern · deps</text>
  <!-- Arrow to artifact -->
  <line x1="558" y1="90" x2="596" y2="90" stroke="#93c5fd" stroke-width="1.5"/>
  <polygon points="596,86 604,90 596,94" fill="#93c5fd"/>

  <!-- Connector line -->
  <line x1="400" y1="112" x2="400" y2="148" stroke="#e2e8f0" stroke-width="2"/>

  <!-- ===== STEP 2 ===== -->
  <circle cx="400" cy="170" r="22" fill="#8b5cf6"/>
  <text x="400" y="176" text-anchor="middle" font-family="sans-serif" font-size="14" fill="white" font-weight="bold">2</text>
  <text x="440" y="165" font-family="sans-serif" font-size="13" fill="#1e293b" font-weight="bold">Planning Agent</text>
  <text x="440" y="183" font-family="monospace" font-size="11" fill="#64748b">input: RESEARCH.md</text>
  <!-- Artifact box right -->
  <rect x="600" y="148" width="165" height="44" rx="7" fill="#fdf4ff" stroke="#d8b4fe" stroke-width="1.5"/>
  <text x="682" y="166" text-anchor="middle" font-family="monospace" font-size="11" fill="#6b21a8" font-weight="bold">PLAN.md</text>
  <text x="682" y="183" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#9333ea">file · modifiche · complessita</text>
  <line x1="558" y1="170" x2="596" y2="170" stroke="#d8b4fe" stroke-width="1.5"/>
  <polygon points="596,166 604,170 596,174" fill="#d8b4fe"/>

  <!-- Connector line -->
  <line x1="400" y1="192" x2="400" y2="228" stroke="#e2e8f0" stroke-width="2"/>

  <!-- ===== HUMAN CHECKPOINT ===== -->
  <rect x="280" y="228" width="240" height="44" rx="22" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="400" y="246" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#92400e" font-weight="bold">HUMAN CHECKPOINT</text>
  <text x="400" y="262" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#b45309">Leggi PLAN.md · digita PROCEED o correggi</text>
  <!-- Left: human icon suggestion -->
  <text x="252" y="256" font-family="sans-serif" font-size="22" fill="#f59e0b">&#128100;</text>

  <!-- Connector line -->
  <line x1="400" y1="272" x2="400" y2="308" stroke="#e2e8f0" stroke-width="2"/>

  <!-- ===== STEP 3 ===== -->
  <circle cx="400" cy="330" r="22" fill="#10b981"/>
  <text x="400" y="336" text-anchor="middle" font-family="sans-serif" font-size="14" fill="white" font-weight="bold">3</text>
  <text x="440" y="325" font-family="sans-serif" font-size="13" fill="#1e293b" font-weight="bold">Implementation Agent</text>
  <text x="440" y="343" font-family="monospace" font-size="11" fill="#64748b">input: PLAN.md + RESEARCH.md</text>
  <!-- Artifact box right -->
  <rect x="600" y="308" width="165" height="44" rx="7" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="682" y="326" text-anchor="middle" font-family="monospace" font-size="11" fill="#166534" font-weight="bold">code + tests</text>
  <text x="682" y="343" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#16a34a">file per file · test dopo ogni file</text>
  <line x1="558" y1="330" x2="596" y2="330" stroke="#86efac" stroke-width="1.5"/>
  <polygon points="596,326 604,330 596,334" fill="#86efac"/>

  <!-- Connector line -->
  <line x1="400" y1="352" x2="400" y2="388" stroke="#e2e8f0" stroke-width="2"/>

  <!-- ===== STEP 4 ===== -->
  <circle cx="400" cy="410" r="22" fill="#f59e0b"/>
  <text x="400" y="416" text-anchor="middle" font-family="sans-serif" font-size="14" fill="white" font-weight="bold">4</text>
  <text x="440" y="405" font-family="sans-serif" font-size="13" fill="#1e293b" font-weight="bold">Review Agent</text>
  <text x="440" y="423" font-family="monospace" font-size="11" fill="#64748b">Verifica rispetto a PLAN.md</text>
  <!-- Artifact box right -->
  <rect x="600" y="388" width="165" height="44" rx="7" fill="#fffbeb" stroke="#fde68a" stroke-width="1.5"/>
  <text x="682" y="406" text-anchor="middle" font-family="monospace" font-size="11" fill="#92400e" font-weight="bold">report discrepanze</text>
  <text x="682" y="423" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#b45309">diff · correzioni proposte</text>
  <line x1="558" y1="410" x2="596" y2="410" stroke="#fde68a" stroke-width="1.5"/>
  <polygon points="596,406 604,410 596,414" fill="#fde68a"/>

  <!-- Left sidebar: "input propagation" notes -->
  <text x="35" y="90" font-family="monospace" font-size="10" fill="#94a3b8">codebase</text>
  <text x="35" y="106" font-family="monospace" font-size="10" fill="#94a3b8">task desc.</text>
  <line x1="100" y1="90" x2="130" y2="90" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="3,3"/>

  <text x="35" y="170" font-family="monospace" font-size="10" fill="#94a3b8">RESEARCH</text>
  <text x="35" y="186" font-family="monospace" font-size="10" fill="#94a3b8">.md</text>
  <line x1="100" y1="170" x2="130" y2="170" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="3,3"/>

  <text x="35" y="325" font-family="monospace" font-size="10" fill="#94a3b8">PLAN.md</text>
  <text x="35" y="341" font-family="monospace" font-size="10" fill="#94a3b8">RESEARCH</text>
  <line x1="100" y1="330" x2="130" y2="330" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Caption -->
  <text x="400" y="484" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#64748b">Ogni step riceve solo il contesto necessario — context isolation riduce errori e degrado della qualita.</text>
</svg>
