<svg width="800" height="420" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="420" fill="#f8fafc"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-family="sans-serif" font-size="17" fill="#1e293b" font-weight="bold">Il ciclo di feedback deterministico</text>

  <!-- ===== MAIN LOOP CIRCLE ===== -->
  <!-- Large circle guide (invisible) to position nodes on a ring -->

  <!-- Node 1: MODIFICA (top) -->
  <rect x="298" y="60" width="204" height="70" rx="12" fill="#1e293b" stroke="#6366f1" stroke-width="2.5"/>
  <text x="400" y="88" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#a5b4fc" font-weight="bold">MODIFICA</text>
  <text x="400" y="108" text-anchor="middle" font-family="monospace" font-size="11" fill="#94a3b8">agent scrive / modifica codice</text>
  <text x="400" y="122" text-anchor="middle" font-family="monospace" font-size="11" fill="#94a3b8">un file alla volta</text>

  <!-- Arrow: MODIFICA -> TEST (top-right arc) -->
  <path d="M 510 95 Q 620 95 620 185" fill="none" stroke="#6366f1" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="616,182 620,194 624,182" fill="#6366f1"/>
  <text x="590" y="148" font-family="monospace" font-size="10" fill="#6366f1">esegui</text>

  <!-- Node 2: TEST (right) -->
  <rect x="565" y="195" width="204" height="80" rx="12" fill="#1e293b" stroke="#10b981" stroke-width="2.5"/>
  <text x="667" y="223" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#6ee7b7" font-weight="bold">TEST / TYPE CHECK</text>
  <text x="667" y="243" text-anchor="middle" font-family="monospace" font-size="11" fill="#94a3b8">pnpm test</text>
  <text x="667" y="259" text-anchor="middle" font-family="monospace" font-size="11" fill="#94a3b8">pnpm tsc --noEmit</text>
  <text x="667" y="275" text-anchor="middle" font-family="monospace" font-size="11" fill="#94a3b8">pnpm lint</text>

  <!-- Arrow: TEST -> FAIL branch (down-left) -->
  <path d="M 565 270 Q 480 320 430 340" fill="none" stroke="#f87171" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="426,338 428,350 436,342" fill="#f87171"/>
  <text x="488" y="320" font-family="sans-serif" font-size="11" fill="#ef4444" font-weight="bold">FAIL</text>

  <!-- Node 3: CORREGGI (bottom) -->
  <rect x="230" y="340" width="204" height="58" rx="12" fill="#1e293b" stroke="#f87171" stroke-width="2.5"/>
  <text x="332" y="365" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#fca5a5" font-weight="bold">CORREGGI</text>
  <text x="332" y="383" text-anchor="middle" font-family="monospace" font-size="11" fill="#94a3b8">analizza errore · fix · riprova</text>

  <!-- Arrow: CORREGGI -> MODIFICA (left arc going up) -->
  <path d="M 230 365 Q 120 300 190 120" fill="none" stroke="#f87171" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="186,123 188,111 196,120" fill="#f87171"/>
  <text x="115" y="250" font-family="monospace" font-size="10" fill="#f87171">riprova</text>

  <!-- Arrow: TEST -> PASS branch (up from test) -->
  <!-- Success path exits the cycle -->
  <path d="M 667 195 Q 667 120 550 95" fill="none" stroke="#10b981" stroke-width="2"/>
  <polygon points="546,92 552,84 556,95" fill="#10b981"/>
  <text x="672" y="155" font-family="sans-serif" font-size="11" fill="#10b981" font-weight="bold">PASS</text>
  <text x="658" y="170" font-family="monospace" font-size="10" fill="#10b981">prossimo file</text>

  <!-- Center: loop label -->
  <text x="370" y="220" text-anchor="middle" font-family="sans-serif" font-size="30" fill="#e2e8f0">&#8635;</text>
  <text x="370" y="250" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#94a3b8">loop</text>
  <text x="370" y="266" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#94a3b8">obbligatorio</text>

  <!-- Right legend: feedback oracles -->
  <!-- Removed (content already in TEST node) -->

  <!-- Bottom caption -->
  <text x="400" y="408" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#64748b">Senza feedback deterministico gli errori si accumulano e il costo di correzione cresce esponenzialmente.</text>
</svg>
