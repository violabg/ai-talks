<svg width="800" height="420" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="420" fill="#f8fafc"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-family="sans-serif" font-size="17" fill="#1e293b" font-weight="bold">I quattro elementi di un prompt efficace</text>

  <!-- Four quadrant cards -->

  <!-- Card 1: CONTESTO — top left -->
  <rect x="40" y="60" width="330" height="140" rx="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
  <rect x="40" y="60" width="330" height="38" rx="10" fill="#bfdbfe"/>
  <rect x="40" y="88" width="330" height="10" rx="0" fill="#bfdbfe"/>
  <text x="205" y="84" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1e40af" font-weight="bold">1. CONTESTO</text>
  <text x="60" y="120" font-family="monospace" font-size="12" fill="#1e40af">Stack, file, struttura del progetto</text>
  <text x="60" y="140" font-family="sans-serif" font-size="12" fill="#3b82f6">Dove si trova il codice?</text>
  <text x="60" y="160" font-family="sans-serif" font-size="12" fill="#3b82f6">Quali dipendenze sono disponibili?</text>
  <text x="60" y="180" font-family="sans-serif" font-size="12" fill="#3b82f6">Cosa esiste gia?</text>

  <!-- Card 2: OBIETTIVO — top right -->
  <rect x="430" y="60" width="330" height="140" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/>
  <rect x="430" y="60" width="330" height="38" rx="10" fill="#bbf7d0"/>
  <rect x="430" y="88" width="330" height="10" rx="0" fill="#bbf7d0"/>
  <text x="595" y="84" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#166534" font-weight="bold">2. OBIETTIVO</text>
  <text x="450" y="120" font-family="monospace" font-size="12" fill="#166534">Cosa deve produrre l&apos;agente?</text>
  <text x="450" y="140" font-family="sans-serif" font-size="12" fill="#16a34a">Quale endpoint / funzione / file?</text>
  <text x="450" y="160" font-family="sans-serif" font-size="12" fill="#16a34a">Quale pattern usare?</text>
  <text x="450" y="180" font-family="sans-serif" font-size="12" fill="#16a34a">Output atteso?</text>

  <!-- Card 3: VINCOLI — bottom left -->
  <rect x="40" y="225" width="330" height="140" rx="10" fill="#fff7ed" stroke="#fdba74" stroke-width="2"/>
  <rect x="40" y="225" width="330" height="38" rx="10" fill="#fed7aa"/>
  <rect x="40" y="253" width="330" height="10" rx="0" fill="#fed7aa"/>
  <text x="205" y="249" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#9a3412" font-weight="bold">3. VINCOLI</text>
  <text x="60" y="285" font-family="monospace" font-size="12" fill="#c2410c">Cosa NON modificare</text>
  <text x="60" y="305" font-family="sans-serif" font-size="12" fill="#ea580c">Interfacce da mantenere stabili</text>
  <text x="60" y="325" font-family="sans-serif" font-size="12" fill="#ea580c">Dipendenze da NON aggiungere</text>
  <text x="60" y="345" font-family="sans-serif" font-size="12" fill="#ea580c">Convenzioni da rispettare</text>

  <!-- Card 4: CRITERIO — bottom right -->
  <rect x="430" y="225" width="330" height="140" rx="10" fill="#fdf4ff" stroke="#d8b4fe" stroke-width="2"/>
  <rect x="430" y="225" width="330" height="38" rx="10" fill="#e9d5ff"/>
  <rect x="430" y="253" width="330" height="10" rx="0" fill="#e9d5ff"/>
  <text x="595" y="249" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#6b21a8" font-weight="bold">4. CRITERIO DI SUCCESSO</text>
  <text x="450" y="285" font-family="monospace" font-size="12" fill="#7e22ce">Come verificare il risultato?</text>
  <text x="450" y="305" font-family="sans-serif" font-size="12" fill="#9333ea">Test che devono passare</text>
  <text x="450" y="325" font-family="sans-serif" font-size="12" fill="#9333ea">Build senza errori</text>
  <text x="450" y="345" font-family="sans-serif" font-size="12" fill="#9333ea">Comportamento atteso osservabile</text>

  <!-- Center connector cross -->
  <line x1="375" y1="130" x2="425" y2="130" stroke="#cbd5e1" stroke-width="1.5"/>
  <line x1="375" y1="295" x2="425" y2="295" stroke="#cbd5e1" stroke-width="1.5"/>
  <line x1="400" y1="200" x2="400" y2="225" stroke="#cbd5e1" stroke-width="1.5"/>
  <line x1="400" y1="60" x2="400" y2="85" stroke="#cbd5e1" stroke-width="1.5"/>

  <!-- Caption -->
  <text x="400" y="400" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#64748b">Senza questi quattro elementi, l&apos;agente riempie i buchi con assunzioni — spesso sbagliate.</text>
</svg>
