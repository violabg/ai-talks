<svg width="800" height="450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/>
    </marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="#0f172a"/>

  <!-- Subtle grid pattern -->
  <line x1="0" y1="150" x2="800" y2="150" stroke="#1e293b" stroke-width="1"/>
  <line x1="0" y1="300" x2="800" y2="300" stroke="#1e293b" stroke-width="1"/>
  <line x1="200" y1="0" x2="200" y2="450" stroke="#1e293b" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="450" stroke="#1e293b" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="450" stroke="#1e293b" stroke-width="1"/>

  <!-- Decorative: flowing pipeline path (background glow) -->
  <path d="M 80 225 C 160 180, 240 270, 320 225 C 400 180, 480 270, 560 225 C 640 180, 720 225, 720 225"
        fill="none" stroke="#7c3aed" stroke-width="2" stroke-opacity="0.25" stroke-dasharray="6,4"/>

  <!-- Step nodes on the pipeline -->
  <!-- Node 1: Prompt -->
  <circle cx="120" cy="225" r="38" fill="#1e293b" stroke="#7c3aed" stroke-width="2"/>
  <text x="120" y="220" text-anchor="middle" font-family="monospace" font-size="11" fill="#a78bfa">PROMPT</text>
  <text x="120" y="236" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748b">context</text>

  <!-- Arrow 1→2 -->
  <line x1="162" y1="225" x2="238" y2="225" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Node 2: Agent -->
  <circle cx="280" cy="225" r="38" fill="#1e293b" stroke="#7c3aed" stroke-width="2"/>
  <text x="280" y="220" text-anchor="middle" font-family="monospace" font-size="11" fill="#a78bfa">AGENT</text>
  <text x="280" y="236" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748b">step 1</text>

  <!-- Arrow 2→3 -->
  <line x1="322" y1="225" x2="398" y2="225" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Node 3: Artefact (highlighted) -->
  <circle cx="440" cy="225" r="42" fill="#3b0764" stroke="#a855f7" stroke-width="2.5"/>
  <text x="440" y="219" text-anchor="middle" font-family="monospace" font-size="10" fill="#e9d5ff">ARTEFACT</text>
  <text x="440" y="234" text-anchor="middle" font-family="monospace" font-size="10" fill="#c084fc">verified</text>

  <!-- Arrow 3→4 -->
  <line x1="484" y1="225" x2="558" y2="225" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Node 4: Review -->
  <circle cx="600" cy="225" r="38" fill="#1e293b" stroke="#7c3aed" stroke-width="2"/>
  <text x="600" y="220" text-anchor="middle" font-family="monospace" font-size="11" fill="#a78bfa">REVIEW</text>
  <text x="600" y="236" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748b">step n</text>

  <!-- Arrow 4→5 -->
  <line x1="642" y1="225" x2="698" y2="225" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Node 5: Output -->
  <circle cx="720" cy="225" r="30" fill="#14532d" stroke="#22c55e" stroke-width="2"/>
  <text x="720" y="221" text-anchor="middle" font-family="monospace" font-size="10" fill="#86efac">OUT</text>
  <text x="720" y="234" text-anchor="middle" font-family="monospace" font-size="9" fill="#4ade80">✓</text>

  <!-- Feedback loop arc (from review back to agent) -->
  <path d="M 595 187 Q 440 110, 285 187" fill="none" stroke="#94a3b8" stroke-width="1"
        stroke-dasharray="5,4" marker-end="url(#arrow-gray)"/>
  <text x="440" y="136" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#64748b">feedback loop</text>

  <!-- Title block -->
  <rect x="60" y="310" width="680" height="90" rx="6" fill="#1e293b" fill-opacity="0.7"/>
  <text x="400" y="348" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#f8fafc" font-weight="700">Prompting e Workflow</text>
  <text x="400" y="375" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#94a3b8">Orchestrare agenti AI per task di ingegneria software</text>

  <!-- Top label -->
  <text x="400" y="38" text-anchor="middle" font-family="monospace" font-size="11" fill="#4c1d95" letter-spacing="3">AI TALKS</text>
</svg>
