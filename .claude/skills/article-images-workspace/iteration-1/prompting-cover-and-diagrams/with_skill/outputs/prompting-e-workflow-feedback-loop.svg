<svg width="800" height="380" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#059669"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
    <marker id="arrow-primary" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="380" fill="#f1f5f9"/>

  <!-- Title -->
  <text x="400" y="34" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#334155" font-weight="700">Ciclo di feedback deterministico</text>

  <!-- 1. MODIFICA box -->
  <rect x="70" y="120" width="160" height="70" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="150" y="150" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#5b21b6" font-weight="600">MODIFICA</text>
  <text x="150" y="169" text-anchor="middle" font-family="monospace" font-size="10" fill="#7c3aed">agent scrive codice</text>

  <!-- Arrow 1 → 2 -->
  <line x1="230" y1="155" x2="318" y2="155" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 2. TEST box (highlighted) -->
  <rect x="320" y="120" width="160" height="70" rx="8" fill="#e2e8f0" stroke="#94a3b8" stroke-width="2"/>
  <text x="400" y="148" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#334155" font-weight="600">TEST</text>
  <text x="400" y="164" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748b">pnpm test</text>
  <text x="400" y="180" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748b">pnpm tsc --noEmit</text>

  <!-- Decision diamond -->
  <polygon points="570,120 640,155 570,190 500,155" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="570" y="150" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#92400e" font-weight="600">Pass?</text>

  <!-- Arrow TEST → Diamond -->
  <line x1="480" y1="155" x2="498" y2="155" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- SUCCESS path: diamond → right -->
  <line x1="640" y1="155" x2="710" y2="155" stroke="#059669" stroke-width="2" marker-end="url(#arrow-green)"/>
  <rect x="712" y="130" width="68" height="50" rx="8" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
  <text x="746" y="152" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#065f46" font-weight="600">NEXT</text>
  <text x="746" y="168" text-anchor="middle" font-family="monospace" font-size="10" fill="#047857">step</text>
  <text x="686" y="148" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#059669" font-weight="600">SI</text>

  <!-- FAIL path: diamond → down -->
  <line x1="570" y1="190" x2="570" y2="255" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <text x="584" y="228" font-family="sans-serif" font-size="10" fill="#dc2626" font-weight="600">NO</text>

  <!-- FIX box -->
  <rect x="490" y="257" width="160" height="60" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="570" y="282" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#991b1b" font-weight="600">CORREGGI</text>
  <text x="570" y="300" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#b91c1c">analizza errore, riprova</text>

  <!-- Arrow FIX → MODIFICA (loop back) -->
  <path d="M 490 287 Q 320 340, 150 200"
        fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow)"/>
  <text x="310" y="348" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#94a3b8">feedback loop</text>

  <!-- Tools legend -->
  <rect x="40" y="298" width="390" height="62" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <text x="55" y="318" font-family="sans-serif" font-size="11" fill="#475569" font-weight="600">Oracoli di feedback:</text>
  <text x="55" y="335" font-family="monospace" font-size="10" fill="#64748b">pnpm test    →  segnale binario pass/fail</text>
  <text x="55" y="350" font-family="monospace" font-size="10" fill="#64748b">pnpm tsc     →  type errors istantanei</text>
  <text x="55" y="365" font-family="monospace" font-size="10" fill="#64748b">pnpm lint    →  warning code quality</text>

  <!-- Caption -->
  <text x="400" y="376" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#64748b">Senza feedback deterministico, gli errori si accumulano in modo esponenziale</text>
</svg>
