<svg width="800" height="420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
    <marker id="arrow-primary" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="420" fill="#f1f5f9"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#334155" font-weight="700">Anatomia di un prompt efficace</text>

  <!-- Center: PROMPT box -->
  <rect x="300" y="160" width="200" height="70" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="2.5"/>
  <text x="400" y="190" text-anchor="middle" font-family="monospace" font-size="14" fill="#5b21b6" font-weight="700">PROMPT</text>
  <text x="400" y="212" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#7c3aed">specifica tecnica</text>

  <!-- Four surrounding elements -->

  <!-- Top-left: CONTESTO -->
  <rect x="60" y="70" width="170" height="80" rx="8" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="145" y="99" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#334155" font-weight="600">CONTESTO</text>
  <text x="145" y="118" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#64748b">Stack, file rilevanti,</text>
  <text x="145" y="134" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#64748b">stato attuale</text>
  <!-- Arrow CONTESTO → PROMPT -->
  <line x1="230" y1="130" x2="312" y2="178" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Top-right: OBIETTIVO -->
  <rect x="570" y="70" width="170" height="80" rx="8" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="655" y="99" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#334155" font-weight="600">OBIETTIVO</text>
  <text x="655" y="118" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#64748b">Cosa deve fare,</text>
  <text x="655" y="134" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#64748b">risultato atteso</text>
  <!-- Arrow OBIETTIVO → PROMPT -->
  <line x1="570" y1="130" x2="488" y2="178" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Bottom-left: VINCOLI -->
  <rect x="60" y="250" width="170" height="80" rx="8" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="145" y="279" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#334155" font-weight="600">VINCOLI</text>
  <text x="145" y="298" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#64748b">Cosa non toccare,</text>
  <text x="145" y="314" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#64748b">limiti dell'azione</text>
  <!-- Arrow VINCOLI → PROMPT -->
  <line x1="230" y1="270" x2="312" y2="218" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Bottom-right: CRITERIO DI SUCCESSO -->
  <rect x="570" y="250" width="170" height="80" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="655" y="279" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1e40af" font-weight="600">CRITERIO</text>
  <text x="655" y="294" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#3b82f6">DI SUCCESSO</text>
  <text x="655" y="312" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#64748b">Come verificare</text>
  <text x="655" y="327" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#64748b">il completamento</text>
  <!-- Arrow CRITERIO → PROMPT -->
  <line x1="570" y1="270" x2="488" y2="218" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-primary)"/>

  <!-- Output arrow from PROMPT downward -->
  <line x1="400" y1="230" x2="400" y2="345" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrow-primary)"/>

  <!-- Output box -->
  <rect x="295" y="348" width="210" height="42" rx="8" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="400" y="372" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#86efac" font-weight="600">Zero ambiguità per l'agente</text>

  <!-- Caption -->
  <text x="400" y="408" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#64748b">Ogni elemento elimina spazio per interpretazioni libere</text>
</svg>
