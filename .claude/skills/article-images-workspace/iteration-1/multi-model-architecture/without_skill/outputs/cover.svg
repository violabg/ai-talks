<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#38bdf8"/>
    </linearGradient>
    <linearGradient id="accent3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#34d399"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#1e293b" stroke-width="1" opacity="0.6"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.4"/>

  <!-- Decorative connection lines in background -->
  <line x1="100" y1="315" x2="300" y2="200" stroke="#6366f1" stroke-width="1.5" opacity="0.3" stroke-dasharray="6,4"/>
  <line x1="100" y1="315" x2="300" y2="315" stroke="#0ea5e9" stroke-width="1.5" opacity="0.3" stroke-dasharray="6,4"/>
  <line x1="100" y1="315" x2="300" y2="430" stroke="#10b981" stroke-width="1.5" opacity="0.3" stroke-dasharray="6,4"/>

  <!-- Orchestrator node (left) -->
  <rect x="30" y="270" width="140" height="90" rx="10" fill="#1e293b" stroke="#6366f1" stroke-width="2"/>
  <text x="100" y="308" text-anchor="middle" font-family="monospace" font-size="11" fill="#a5b4fc">GitHub</text>
  <text x="100" y="324" text-anchor="middle" font-family="monospace" font-size="11" fill="#a5b4fc">Copilot CLI</text>
  <text x="100" y="342" text-anchor="middle" font-family="monospace" font-size="10" fill="#6366f1">orchestratore</text>

  <!-- Model nodes (right cluster) -->
  <!-- Sonnet -->
  <rect x="290" y="155" width="130" height="80" rx="10" fill="#1e293b" stroke="#8b5cf6" stroke-width="2" filter="url(#glow)"/>
  <text x="355" y="188" text-anchor="middle" font-family="monospace" font-size="12" fill="#c4b5fd">Claude</text>
  <text x="355" y="206" text-anchor="middle" font-family="monospace" font-size="12" fill="#c4b5fd">Sonnet</text>
  <text x="355" y="222" text-anchor="middle" font-family="monospace" font-size="10" fill="#8b5cf6">planning</text>

  <!-- GPT-4 -->
  <rect x="290" y="275" width="130" height="80" rx="10" fill="#1e293b" stroke="#0ea5e9" stroke-width="2" filter="url(#glow)"/>
  <text x="355" y="308" text-anchor="middle" font-family="monospace" font-size="12" fill="#7dd3fc">GPT-4</text>
  <text x="355" y="326" text-anchor="middle" font-family="monospace" font-size="10" fill="#0ea5e9">coding</text>
  <text x="355" y="342" text-anchor="middle" font-family="monospace" font-size="10" fill="#0ea5e9">review</text>

  <!-- Opus -->
  <rect x="290" y="395" width="130" height="80" rx="10" fill="#1e293b" stroke="#10b981" stroke-width="2" filter="url(#glow)"/>
  <text x="355" y="428" text-anchor="middle" font-family="monospace" font-size="12" fill="#6ee7b7">Claude</text>
  <text x="355" y="446" text-anchor="middle" font-family="monospace" font-size="12" fill="#6ee7b7">Opus</text>
  <text x="355" y="462" text-anchor="middle" font-family="monospace" font-size="10" fill="#10b981">architettura</text>

  <!-- Arrow heads -->
  <defs>
    <marker id="arr1" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6366f1" opacity="0.5"/>
    </marker>
    <marker id="arr2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#0ea5e9" opacity="0.5"/>
    </marker>
    <marker id="arr3" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#10b981" opacity="0.5"/>
    </marker>
  </defs>
  <line x1="170" y1="300" x2="285" y2="205" stroke="#8b5cf6" stroke-width="1.5" opacity="0.5" marker-end="url(#arr1)" stroke-dasharray="6,4"/>
  <line x1="170" y1="315" x2="285" y2="315" stroke="#0ea5e9" stroke-width="1.5" opacity="0.5" marker-end="url(#arr2)" stroke-dasharray="6,4"/>
  <line x1="170" y1="330" x2="285" y2="425" stroke="#10b981" stroke-width="1.5" opacity="0.5" marker-end="url(#arr3)" stroke-dasharray="6,4"/>

  <!-- Main title area -->
  <text x="490" y="210" font-family="sans-serif" font-size="13" fill="#64748b" font-weight="500" letter-spacing="3">GITHUB COPILOT CLI</text>
  <text x="490" y="275" font-family="sans-serif" font-size="52" fill="#f1f5f9" font-weight="700" letter-spacing="-1">Orchestrazione</text>
  <text x="490" y="345" font-family="sans-serif" font-size="52" fill="#f1f5f9" font-weight="700" letter-spacing="-1">multi-modello</text>

  <!-- Subtitle -->
  <text x="490" y="400" font-family="sans-serif" font-size="18" fill="#94a3b8">Fleet di sub-agenti specializzati · Adversarial review</text>
  <text x="490" y="428" font-family="sans-serif" font-size="18" fill="#94a3b8">Selezione dinamica del modello · Workflow personalizzati</text>

  <!-- Decorative tag pills -->
  <rect x="490" y="475" width="100" height="28" rx="14" fill="#312e81" stroke="#6366f1" stroke-width="1"/>
  <text x="540" y="494" text-anchor="middle" font-family="monospace" font-size="11" fill="#a5b4fc">/fleet</text>

  <rect x="602" y="475" width="130" height="28" rx="14" fill="#0c2340" stroke="#0ea5e9" stroke-width="1"/>
  <text x="667" y="494" text-anchor="middle" font-family="monospace" font-size="11" fill="#7dd3fc">sub-agents</text>

  <rect x="744" y="475" width="140" height="28" rx="14" fill="#052e16" stroke="#10b981" stroke-width="1"/>
  <text x="814" y="494" text-anchor="middle" font-family="monospace" font-size="11" fill="#6ee7b7">adversarial review</text>

  <rect x="896" y="475" width="110" height="28" rx="14" fill="#1c1917" stroke="#f59e0b" stroke-width="1"/>
  <text x="951" y="494" text-anchor="middle" font-family="monospace" font-size="11" fill="#fcd34d">MCP tools</text>

  <!-- Bottom accent line -->
  <rect x="490" y="560" width="680" height="3" rx="2" fill="url(#accent1)" opacity="0.6"/>
</svg>
