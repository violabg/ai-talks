<svg width="800" height="450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/>
    </marker>
  </defs>

  <!-- Dark background -->
  <rect width="800" height="450" fill="#0f172a"/>

  <!-- Subtle grid pattern -->
  <g stroke="#1e293b" stroke-width="1" opacity="0.8">
    <line x1="0" y1="75" x2="800" y2="75"/>
    <line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="225" x2="800" y2="225"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="375" x2="800" y2="375"/>
    <line x1="100" y1="0" x2="100" y2="450"/>
    <line x1="200" y1="0" x2="200" y2="450"/>
    <line x1="300" y1="0" x2="300" y2="450"/>
    <line x1="400" y1="0" x2="400" y2="450"/>
    <line x1="500" y1="0" x2="500" y2="450"/>
    <line x1="600" y1="0" x2="600" y2="450"/>
    <line x1="700" y1="0" x2="700" y2="450"/>
  </g>

  <!-- Orchestrator node — center, glowing purple -->
  <rect x="300" y="160" width="200" height="70" rx="12" fill="#3b0764" stroke="#7c3aed" stroke-width="2.5"/>
  <text x="400" y="190" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#a78bfa" font-weight="700">ORCHESTRATOR</text>
  <text x="400" y="210" text-anchor="middle" font-family="monospace" font-size="11" fill="#7c3aed">GitHub Copilot CLI</text>

  <!-- Sub-agent: Sonnet (plan) — top-left -->
  <rect x="60" y="60" width="150" height="60" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="135" y="85" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#e2e8f0" font-weight="600">Sonnet</text>
  <text x="135" y="105" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#94a3b8">Planning</text>

  <!-- Sub-agent: GPT-4 (coding) — top-right -->
  <rect x="590" y="60" width="150" height="60" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="665" y="85" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#e2e8f0" font-weight="600">GPT-4</text>
  <text x="665" y="105" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#94a3b8">Coding</text>

  <!-- Sub-agent: Haiku (explore) — bottom-left -->
  <rect x="60" y="330" width="150" height="60" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="135" y="355" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#e2e8f0" font-weight="600">Claude Haiku</text>
  <text x="135" y="375" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#94a3b8">Explore</text>

  <!-- Sub-agent: Opus (design) — bottom-right -->
  <rect x="590" y="330" width="150" height="60" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="665" y="355" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#e2e8f0" font-weight="600">Opus</text>
  <text x="665" y="375" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#94a3b8">Architecture</text>

  <!-- Arrows from orchestrator to agents -->
  <line x1="300" y1="185" x2="218" y2="108" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow)" opacity="0.8"/>
  <line x1="500" y1="185" x2="582" y2="108" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow)" opacity="0.8"/>
  <line x1="300" y1="215" x2="218" y2="348" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow)" opacity="0.8"/>
  <line x1="500" y1="215" x2="582" y2="348" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow)" opacity="0.8"/>

  <!-- Title text -->
  <text x="400" y="420" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#f8fafc" font-weight="700" letter-spacing="0.5">Orchestrazione Multi-Modello</text>
  <text x="400" y="440" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#7c3aed" font-weight="600" letter-spacing="1">con GitHub Copilot CLI</text>
</svg>
