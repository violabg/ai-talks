<svg width="800" height="420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
    <marker id="arrow-primary" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/>
    </marker>
    <marker id="arrow-warn" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d97706"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="420" fill="#f1f5f9"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#334155" font-weight="700">Adversarial Review: più modelli che revisionano lo stesso codice</text>

  <!-- Input: Code box -->
  <rect x="300" y="55" width="200" height="55" rx="8" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="400" y="79" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#334155" font-weight="600">Codice generato</text>
  <text x="400" y="99" text-anchor="middle" font-family="monospace" font-size="11" fill="#64748b">output da revisionare</text>

  <!-- 3 arrows down to reviewers -->
  <line x1="350" y1="110" x2="160" y2="175" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="400" y1="110" x2="400" y2="175" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="450" y1="110" x2="640" y2="175" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Reviewer 1: Sonnet -->
  <rect x="60" y="175" width="190" height="85" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="155" y="200" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5b21b6" font-weight="700">Reviewer: Sonnet</text>
  <line x1="75" y1="210" x2="235" y2="210" stroke="#c4b5fd" stroke-width="1"/>
  <text x="155" y="228" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#7c3aed">logica e coerenza</text>
  <text x="155" y="246" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#7c3aed">architetturale</text>

  <!-- Reviewer 2: Opus -->
  <rect x="305" y="175" width="190" height="85" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="400" y="200" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5b21b6" font-weight="700">Reviewer: Opus</text>
  <line x1="320" y1="210" x2="480" y2="210" stroke="#c4b5fd" stroke-width="1"/>
  <text x="400" y="228" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#7c3aed">design e pattern</text>
  <text x="400" y="246" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#7c3aed">a lungo termine</text>

  <!-- Reviewer 3: GPT-4 -->
  <rect x="550" y="175" width="190" height="85" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="645" y="200" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5b21b6" font-weight="700">Reviewer: GPT-4</text>
  <line x1="565" y1="210" x2="725" y2="210" stroke="#c4b5fd" stroke-width="1"/>
  <text x="645" y="228" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#7c3aed">sicurezza e</text>
  <text x="645" y="246" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#7c3aed">vulnerabilità</text>

  <!-- Parallel label -->
  <text x="400" y="165" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#059669" font-weight="600">esecuzione parallela</text>

  <!-- Arrows to consolidated result -->
  <line x1="155" y1="260" x2="340" y2="315" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow-primary)"/>
  <line x1="400" y1="260" x2="400" y2="315" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow-primary)"/>
  <line x1="645" y1="260" x2="460" y2="315" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow-primary)"/>

  <!-- Consolidated result -->
  <rect x="270" y="315" width="260" height="60" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2.5"/>
  <text x="400" y="340" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#5b21b6" font-weight="700">Lista consolidata</text>
  <text x="400" y="360" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#7c3aed">miglioramenti da prospettive indipendenti</text>

  <!-- Caption -->
  <text x="400" y="405" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#64748b">Modelli diversi trovano punti ciechi diversi — la review incrociata riduce gli errori sistematici</text>
</svg>
