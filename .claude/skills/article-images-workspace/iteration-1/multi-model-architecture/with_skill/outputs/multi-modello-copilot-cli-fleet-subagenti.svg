<svg width="800" height="450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
    <marker id="arrow-primary" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="#f1f5f9"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#334155" font-weight="700">Fleet: orchestrazione parallela di sub-agenti</text>

  <!-- User request box -->
  <rect x="300" y="60" width="200" height="55" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="400" y="83" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#5b21b6" font-weight="600">Richiesta utente</text>
  <text x="400" y="103" text-anchor="middle" font-family="monospace" font-size="11" fill="#7c3aed">/fleet</text>

  <!-- Arrow down to Fleet -->
  <line x1="400" y1="115" x2="400" y2="148" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow-primary)"/>

  <!-- Fleet orchestrator box -->
  <rect x="280" y="150" width="240" height="55" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2.5"/>
  <text x="400" y="173" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#5b21b6" font-weight="700">Fleet Orchestrator</text>
  <text x="400" y="193" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#7c3aed">analizza · pianifica · distribuisce</text>

  <!-- Three arrows spreading to sub-agents -->
  <line x1="330" y1="205" x2="155" y2="265" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="400" y1="205" x2="400" y2="265" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="470" y1="205" x2="645" y2="265" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Sub-agent 1 -->
  <rect x="60" y="265" width="190" height="70" rx="8" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="155" y="290" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#334155" font-weight="600">Sub-Agente A</text>
  <text x="155" y="310" text-anchor="middle" font-family="monospace" font-size="11" fill="#64748b">Claude Haiku</text>
  <text x="155" y="326" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#94a3b8">esplora struttura</text>

  <!-- Sub-agent 2 -->
  <rect x="305" y="265" width="190" height="70" rx="8" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="400" y="290" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#334155" font-weight="600">Sub-Agente B</text>
  <text x="400" y="310" text-anchor="middle" font-family="monospace" font-size="11" fill="#64748b">Claude Sonnet</text>
  <text x="400" y="326" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#94a3b8">implementazione</text>

  <!-- Sub-agent 3 -->
  <rect x="550" y="265" width="190" height="70" rx="8" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="645" y="290" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#334155" font-weight="600">Sub-Agente C</text>
  <text x="645" y="310" text-anchor="middle" font-family="monospace" font-size="11" fill="#64748b">GPT-4</text>
  <text x="645" y="326" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#94a3b8">revisione</text>

  <!-- Parallel execution label -->
  <rect x="60" y="248" width="680" height="16" rx="4" fill="none" stroke="#d1fae5" stroke-width="0"/>
  <text x="400" y="256" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#059669" font-weight="600">esecuzione parallela</text>

  <!-- Arrows back up to result -->
  <line x1="155" y1="335" x2="340" y2="385" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="400" y1="335" x2="400" y2="385" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="645" y1="335" x2="460" y2="385" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Result box -->
  <rect x="280" y="385" width="240" height="45" rx="8" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="400" y="410" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#334155" font-weight="600">Risultato consolidato</text>
  <text x="400" y="426" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#64748b">output unificato al modello principale</text>

  <!-- Caption -->
  <text x="400" y="445" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#64748b">Fleet distribuisce il lavoro tra agenti specializzati in parallelo, riducendo i tempi</text>
</svg>
