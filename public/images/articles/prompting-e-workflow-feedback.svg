<svg width="800" height="450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#f1f5f9"/>

  <defs>
    <marker id="arrow-f" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/>
    </marker>
    <marker id="arrow-ok" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arrow-err" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#334155" font-weight="700">Ciclo di feedback: modifica, verifica, correggi</text>

  <!-- === Main loop (center) === -->

  <!-- Step: MODIFICA -->
  <rect x="100" y="150" width="160" height="70" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="180" y="180" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#5b21b6" font-weight="700">Modifica</text>
  <text x="180" y="200" text-anchor="middle" font-family="monospace" font-size="10" fill="#7c3aed">scrivi codice</text>

  <!-- Arrow: Modifica → Test -->
  <line x1="260" y1="185" x2="320" y2="185" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrow-f)"/>

  <!-- Step: TEST -->
  <rect x="325" y="150" width="160" height="70" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="405" y="180" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#5b21b6" font-weight="700">Verifica</text>
  <text x="405" y="200" text-anchor="middle" font-family="monospace" font-size="10" fill="#7c3aed">pnpm test</text>

  <!-- Diamond: pass/fail -->
  <polygon points="570,185 620,215 570,245 520,215" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="570" y="220" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#92400e" font-weight="600">Pass?</text>

  <!-- Arrow: Test → Diamond -->
  <line x1="485" y1="185" x2="524" y2="210" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow-f)"/>

  <!-- Pass path → Procedi -->
  <rect x="660" y="140" width="110" height="50" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="715" y="162" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#166534" font-weight="700">Procedi</text>
  <text x="715" y="178" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#16a34a">prossimo file</text>
  <line x1="620" y1="200" x2="660" y2="175" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-ok)"/>
  <text x="635" y="178" font-family="sans-serif" font-size="9" fill="#16a34a" font-weight="600">SI</text>

  <!-- Fail path → Correggi → back to Modifica -->
  <rect x="490" y="280" width="160" height="60" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="570" y="306" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#991b1b" font-weight="700">Correggi</text>
  <text x="570" y="325" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#dc2626">analizza errore</text>
  <line x1="570" y1="245" x2="570" y2="280" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrow-err)"/>
  <text x="582" y="268" font-family="sans-serif" font-size="9" fill="#dc2626" font-weight="600">NO</text>

  <!-- Arrow: Correggi → back to Modifica -->
  <path d="M 490 310 Q 180 310 180 220" fill="none" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="6 3" marker-end="url(#arrow-err)"/>

  <!-- === Three oracles at the bottom === -->
  <text x="400" y="385" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#334155" font-weight="600">Oracoli di feedback</text>

  <!-- Oracle 1: Test -->
  <rect x="100" y="400" width="150" height="35" rx="6" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1"/>
  <text x="175" y="423" text-anchor="middle" font-family="monospace" font-size="11" fill="#475569">pnpm test</text>

  <!-- Oracle 2: TypeScript -->
  <rect x="325" y="400" width="150" height="35" rx="6" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1"/>
  <text x="400" y="423" text-anchor="middle" font-family="monospace" font-size="11" fill="#475569">tsc --noEmit</text>

  <!-- Oracle 3: Lint -->
  <rect x="550" y="400" width="150" height="35" rx="6" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1"/>
  <text x="625" y="423" text-anchor="middle" font-family="monospace" font-size="11" fill="#475569">pnpm lint</text>

  <!-- Subtitle -->
  <text x="400" y="75" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#64748b">Il loop modifica-verifica-correggi evita l'accumulo di errori</text>
</svg>