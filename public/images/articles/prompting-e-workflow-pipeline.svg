<svg width="800" height="450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#f1f5f9"/>

  <defs>
    <marker id="arrow-p" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/>
    </marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#334155" font-weight="700">Workflow multi-agente con checkpoint</text>

  <!-- Step 1 — Research -->
  <rect x="40" y="65" width="160" height="70" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="120" y="93" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#5b21b6" font-weight="700">Step 1</text>
  <text x="120" y="115" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#7c3aed">Research Agent</text>

  <!-- Artifact 1 -->
  <rect x="75" y="155" width="90" height="28" rx="14" fill="#ffffff" stroke="#94a3b8" stroke-width="1"/>
  <text x="120" y="174" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748b">RESEARCH.md</text>

  <!-- Arrow 1→2 -->
  <line x1="200" y1="100" x2="260" y2="100" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow-p)"/>

  <!-- Step 2 — Planning -->
  <rect x="265" y="65" width="160" height="70" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="345" y="93" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#5b21b6" font-weight="700">Step 2</text>
  <text x="345" y="115" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#7c3aed">Planning Agent</text>

  <!-- Artifact 2 -->
  <rect x="310" y="155" width="70" height="28" rx="14" fill="#ffffff" stroke="#94a3b8" stroke-width="1"/>
  <text x="345" y="174" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748b">PLAN.md</text>

  <!-- Human checkpoint -->
  <rect x="240" y="200" width="210" height="44" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="345" y="218" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#92400e" font-weight="600">HUMAN CHECKPOINT</text>
  <text x="345" y="235" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#a16207">Verifica piano, poi PROCEED</text>

  <!-- Arrow down from checkpoint -->
  <line x1="345" y1="244" x2="345" y2="274" stroke="#d97706" stroke-width="1.5" marker-end="url(#arrow-p)"/>

  <!-- Step 3 — Implementation -->
  <rect x="265" y="278" width="160" height="70" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="345" y="306" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#5b21b6" font-weight="700">Step 3</text>
  <text x="345" y="328" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#7c3aed">Implementation Agent</text>

  <!-- Artifact 3 -->
  <rect x="305" y="368" width="80" height="28" rx="14" fill="#ffffff" stroke="#94a3b8" stroke-width="1"/>
  <text x="345" y="387" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748b">code + tests</text>

  <!-- Arrow 3→4 -->
  <line x1="425" y1="313" x2="530" y2="313" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow-p)"/>

  <!-- Step 4 — Review -->
  <rect x="535" y="278" width="160" height="70" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="615" y="306" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#5b21b6" font-weight="700">Step 4</text>
  <text x="615" y="328" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#7c3aed">Review Agent</text>

  <!-- Artifact 4 -->
  <rect x="575" y="368" width="80" height="28" rx="14" fill="#ffffff" stroke="#94a3b8" stroke-width="1"/>
  <text x="615" y="387" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748b">report</text>

  <!-- Feedback arrow from Review back -->
  <path d="M 695 313 Q 740 313 740 200 Q 740 100 615 100" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow-gray)"/>
  <text x="755" y="205" font-family="sans-serif" font-size="9" fill="#94a3b8" transform="rotate(-90 755 205)">correzioni</text>

  <!-- Context isolation note -->
  <rect x="40" y="278" width="190" height="70" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="135" y="300" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#334155" font-weight="600">Context isolation</text>
  <text x="135" y="318" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#64748b">Ogni agente riceve solo</text>
  <text x="135" y="333" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#64748b">l'input che gli serve,</text>

  <!-- Caption -->
  <text x="400" y="432" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#64748b">Ogni step produce un artefatto verificabile — il workflow diventa ispezionabile e correggibile</text>
</svg>